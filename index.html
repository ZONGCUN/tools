
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>客如云 · 产品亮点</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1565FF;--blue-dark:#0A3D9E;--blue-light:#E8F1FF;
  --text:#1A1A2E;--text2:#5A6178;--text3:#9AA3B8;
  --card:#FFFFFF;--bg:#F2F5FA;--border:#E8ECF4;
  --shadow:0 2px 16px rgba(21,101,255,.06);
  --shadow-hover:0 8px 30px rgba(21,101,255,.12);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text)}

.app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:500px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}

/* ===== 头部 ===== */
.header{background:linear-gradient(160deg,#061B4D 0%,#0F3B99 30%,#1565FF 65%,#4C9AFF 100%);padding:0;flex-shrink:0;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(76,154,255,.2) 0%,transparent 70%);top:-100px;right:-80px}
.header::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);bottom:-80px;left:-40px}

/* 装饰网格 */
.header-grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none}

.header-inner{position:relative;z-index:2;padding:22px 20px 22px}
.header-top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.logo-box{width:48px;height:48px;background:rgba(255,255,255,.12);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.brand-info h1{color:#fff;font-size:22px;font-weight:800;letter-spacing:.5px;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.brand-info p{color:rgba(255,255,255,.7);font-size:12px;margin-top:3px;font-weight:500;letter-spacing:.5px}

.search-bar{position:relative}
.search-bar input{width:100%;height:44px;border:none;border-radius:22px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:0 18px 0 44px;font-size:14px;color:var(--text);outline:none;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.search-bar input::placeholder{color:#B0B8CC}
.search-bar input:focus{box-shadow:0 4px 20px rgba(0,0,0,.1),0 0 0 3px rgba(255,255,255,.25)}
.search-bar .s-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.5}

/* ===== 统计条 ===== */
.stats-bar{display:flex;background:#fff;margin:-16px 16px 0;border-radius:18px;padding:18px 0;box-shadow:0 4px 24px rgba(21,101,255,.08);flex-shrink:0;position:relative;z-index:3;border:1px solid rgba(21,101,255,.06)}
.stat-item{flex:1;text-align:center;position:relative}
.stat-item:not(:last-child)::after{content:'';position:absolute;right:0;top:8px;bottom:8px;width:1px;background:linear-gradient(180deg,transparent,var(--border),transparent)}
.stat-num{font-size:28px;font-weight:900;background:linear-gradient(135deg,#1565FF 0%,#4C9AFF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}

/* ===== 分类标签 ===== */
.tab-section{padding:18px 16px 6px;flex-shrink:0}
.section-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:4px}
.tab-bar{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:9px 20px;border-radius:22px;font-size:13px;font-weight:600;color:var(--text2);background:#fff;border:1.5px solid var(--border);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;position:relative;overflow:hidden}
.tab-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#1565FF,#4C9AFF);opacity:0;transition:opacity .3s}
.tab-btn:active{transform:scale(.95)}
.tab-btn.active{color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(21,101,255,.3);transform:scale(1)}
.tab-btn.active::before{opacity:1}
.tab-btn span{position:relative;z-index:1}

/* ===== 内容区 ===== */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 24px}
.content::-webkit-scrollbar{display:none}

/* ===== 产品卡片 ===== */
.product-grid{display:flex;flex-direction:column;gap:10px}
.product-card{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);text-decoration:none;color:inherit;border:1.5px solid transparent;position:relative;overflow:hidden}
.product-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#1565FF,#4C9AFF);opacity:0;transition:opacity .25s}
.product-card:active{transform:scale(.98);border-color:rgba(21,101,255,.15);box-shadow:var(--shadow-hover)}
.product-card:active::before{opacity:1}

.p-icon{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;position:relative}
.p-icon::after{content:'';position:absolute;inset:0;border-radius:15px;border:1px solid rgba(255,255,255,.6)}
.cat-product .p-icon{background:linear-gradient(145deg,#E8F1FF 0%,#D0E4FF 100%);box-shadow:0 3px 12px rgba(21,101,255,.1)}
.cat-ai .p-icon{background:linear-gradient(145deg,#F0E8FF 0%,#DFD0FF 100%);box-shadow:0 3px 12px rgba(139,92,246,.1)}

.p-info{flex:1;min-width:0}
.p-name{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-desc{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500}

.p-arrow{width:30px;height:30px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s}
.p-arrow svg{width:14px;height:14px;fill:var(--blue);transition:transform .25s}
.product-card:active .p-arrow{background:var(--blue)}
.product-card:active .p-arrow svg{fill:#fff;transform:translateX(2px)}

.product-card.disabled{opacity:.4;cursor:default}
.product-card.disabled:active{transform:none;border-color:transparent;box-shadow:var(--shadow)}
.product-card.disabled .p-arrow{background:#f0f0f0}
.product-card.disabled .p-arrow svg{fill:#ccc}

/* ===== 搜索提示 ===== */
.search-tip{padding:6px 0 14px;font-size:12px;color:var(--text3);font-weight:500}

/* ===== 空状态 ===== */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.4}
.empty-text{font-size:15px;font-weight:500}

/* ===== 图片查看器 ===== */
.viewer{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;background:rgba(0,0,0,.96)}
.viewer.show{display:flex;animation:viewerIn .3s ease}
@keyframes viewerIn{from{opacity:0}to{opacity:1}}

.viewer-header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 8px;background:rgba(0,0,0,.6);backdrop-filter:blur(20px);flex-shrink:0;z-index:2;border-bottom:1px solid rgba(255,255,255,.06)}
.viewer-title{color:#fff;font-size:15px;font-weight:600;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px}
.viewer-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;cursor:pointer;border-radius:50%;transition:all .2s;flex-shrink:0;border:none;background:rgba(255,255,255,.08)}
.viewer-btn:active{background:rgba(255,255,255,.2);transform:scale(.9)}

.viewer-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.viewer-body img{width:100%;display:block;min-height:100%}
.viewer-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,.5);font-size:14px;z-index:1}
.viewer-loading .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 底部安全区 */
.safe-bottom{height:env(safe-area-inset-bottom,0);background:var(--bg);flex-shrink:0}

/* ===== 入场动画 ===== */
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.product-card{animation:cardIn .4s ease backwards}
.product-card:nth-child(1){animation-delay:.02s}
.product-card:nth-child(2){animation-delay:.04s}
.product-card:nth-child(3){animation-delay:.06s}
.product-card:nth-child(4){animation-delay:.08s}
.product-card:nth-child(5){animation-delay:.1s}
.product-card:nth-child(6){animation-delay:.12s}
.product-card:nth-child(7){animation-delay:.14s}
.product-card:nth-child(8){animation-delay:.16s}
.product-card:nth-child(9){animation-delay:.18s}
.product-card:nth-child(10){animation-delay:.2s}
</style>
</head>
<body>
<div class="app">
  <!-- 头部 -->
  <div class="header">
    <div class="header-grid"></div>
    <div class="header-inner">
      <div class="header-top">
        <div class="logo-box">☁️</div>
        <div class="brand-info">
          <h1>客如云 · 产品亮点</h1>
          <p>餐饮数字化服务专家</p>
        </div>
      </div>
      <div class="search-bar">
        <span class="s-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索产品名称...">
      </div>
    </div>
  </div>

  <!-- 统计条 -->
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="statProduct">0</div><div class="stat-label">产品知识</div></div>
    <div class="stat-item"><div class="stat-num" id="statAI">0</div><div class="stat-label">AI专区</div></div>
    <div class="stat-item"><div class="stat-num" id="statTotal">0</div><div class="stat-label">全部内容</div></div>
  </div>

  <!-- 分类标签 -->
  <div class="tab-section">
    <div class="section-label">内容分类</div>
    <div class="tab-bar" id="tabBar">
      <div class="tab-btn active" data-cat="all"><span>📋 全部</span></div>
      <div class="tab-btn" data-cat="product"><span>📦 产品知识</span></div>
      <div class="tab-btn" data-cat="ai"><span>🤖 AI专区</span></div>
    </div>
  </div>

  <!-- 内容 -->
  <div class="content" id="content"></div>
  <div class="safe-bottom"></div>
</div>

<!-- 图片查看器 -->
<div class="viewer" id="viewer">
  <div class="viewer-header">
    <button class="viewer-btn" onclick="closeViewer()">✕</button>
    <div class="viewer-title" id="viewerTitle"></div>
    <button class="viewer-btn" id="viewerNext" onclick="viewNext()">›</button>
  </div>
  <div class="viewer-body" id="viewerBody">
    <div class="viewer-loading" id="viewerLoading">
      <div class="spinner"></div>
      <span>加载中...</span>
    </div>
    <img id="viewerImg" alt="">
  </div>
</div>

<script>
const DATA = [
  { cat:'product', name:'KPOS智享版', icon:'💳', desc:'智能收银管理系统', link:'https://img.alicdn.com/imgextra/i3/O1CN01PhG05X1VMiMcpgnR5_!!6000000002639-0-tps-1080-7855.jpg' },
  { cat:'product', name:'私域营销', icon:'📣', desc:'全链路私域运营方案', link:'https://img.alicdn.com/imgextra/i1/O1CN01RtJuS81gZVCCDrhkS_!!6000000004156-0-tps-1242-10943.jpg' },
  { cat:'product', name:'智慧屏CDS', icon:'📺', desc:'叫号·菜单·广告三合一', link:'https://img.alicdn.com/imgextra/i1/O1CN01jKQYTZ1UQ5fRh0rbm_!!6000000002511-0-tps-1242-7343.jpg' },
  { cat:'product', name:'移动点餐宝', icon:'📱', desc:'移动化点餐解决方案', link:'https://img.alicdn.com/imgextra/i4/O1CN01BWTdlM1iKVSXSlVbC_!!6000000004394-0-tps-1242-13114.jpg' },
  { cat:'product', name:'数智报表', icon:'📊', desc:'200+模板数据中台', link:'https://img.alicdn.com/imgextra/i3/O1CN01LgPcsj1Whc3Gy6kmO_!!6000000002820-0-tps-1242-7446.jpg' },
  { cat:'product', name:'智能后厨KDS', icon:'👨‍🍳', desc:'后厨无纸化智能管控', link:'https://img.alicdn.com/imgextra/i1/O1CN01xsnVqc213XUCGh4bb_!!6000000006929-0-tps-1242-9493.jpg' },
  { cat:'product', name:'企微代运营', icon:'💬', desc:'全案托管社群运营', link:'https://img.alicdn.com/imgextra/i3/O1CN01Tv1DaE24qUfSyuIHK_!!6000000007442-0-tps-1836-13492.jpg' },
  { cat:'product', name:'碰碰贴', icon:'👆', desc:'NFC碰一碰智能互动', link:'https://img.alicdn.com/imgextra/i3/O1CN010DbquX1lebgm9gcSq_!!6000000004844-0-tps-1242-9845.jpg' },
  { cat:'product', name:'经营大屏', icon:'🖥️', desc:'实时经营数据可视化', link:'https://img.alicdn.com/imgextra/i3/O1CN01ERnKi220jO3kms6Em_!!6000000006885-0-tps-1242-7406.jpg' },
  { cat:'product', name:'易定', icon:'📋', desc:'智能预订管理系统', link:'https://img.alicdn.com/imgextra/i3/O1CN01cKas1H1ks3hpV0FjQ_!!6000000004738-0-tps-1242-10091.jpg' },
  { cat:'product', name:'智能巡店', icon:'📹', desc:'远程巡店智能管理', link:'https://img.alicdn.com/imgextra/i1/O1CN01ePst2920lDdxCMKQl_!!6000000006889-0-tps-2400-18774.jpg' },
  { cat:'product', name:'新零售', icon:'🛒', desc:'线上线下全渠道融合', link:'https://img.alicdn.com/imgextra/i4/O1CN01OrFhlx26pEoUpAwJm_!!6000000007710-0-tps-1080-13361.jpg' },
  { cat:'product', name:'进销存', icon:'📦', desc:'智能库存管理系统', link:'https://img.alicdn.com/imgextra/i4/O1CN01XR5AuN1jrlqCRapkj_!!6000000004602-0-tps-1242-7952.jpg' },
  { cat:'product', name:'文典供应链', icon:'🔗', desc:'供应链协同管理平台', link:'https://img.alicdn.com/imgextra/i2/O1CN01nsaKXy1wjbmt75RsP_!!6000000006344-0-tps-750-11224.jpg' },
  { cat:'product', name:'电子发票', icon:'🧾', desc:'数字化发票管理', link:'https://img.alicdn.com/imgextra/i3/O1CN01WfKXSi1nFzdRGcxuP_!!6000000005061-0-tps-930-5342.jpg' },
  { cat:'product', name:'智慧分销商城', icon:'🏪', desc:'分销裂变增长引擎', link:'https://img.alicdn.com/imgextra/i1/O1CN01umNvzd22xhffC2rA4_!!6000000007187-0-tps-1125-11530.jpg' },
  { cat:'ai', name:'客服AI', icon:'💁', desc:'智能客服应答', link:'' },
  { cat:'ai', name:'效率AI', icon:'⚡', desc:'AI驱动效率提升', link:'' },
  { cat:'ai', name:'效果AI', icon:'🎯', desc:'AI精准营销效果', link:'' }
];

let currentCat = 'all';
let currentList = [];
let currentIndex = 0;

function render(keyword) {
  const el = document.getElementById('content');
  let items;
  if (keyword) {
    items = DATA.filter(d => d.name.toLowerCase().includes(keyword.toLowerCase()) || d.desc.toLowerCase().includes(keyword.toLowerCase()));
  } else {
    items = currentCat === 'all' ? [...DATA] : DATA.filter(d => d.cat === currentCat);
  }
  if (items.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">未找到相关产品</div></div>';
    return;
  }
  let html = keyword ? `<div class="search-tip">找到 ${items.length} 个结果</div>` : '';
  html += '<div class="product-grid">';
  items.forEach(item => {
    const hasLink = item.link && item.link.length > 0;
    const catClass = item.cat === 'ai' ? 'cat-ai' : 'cat-product';
    const disabledClass = hasLink ? '' : ' disabled';
    const clickAttr = hasLink ? `onclick="openViewer('${encodeURIComponent(item.link)}','${item.name}')"` : '';
    html += `<div class="product-card ${catClass}${disabledClass}" ${clickAttr}>
      <div class="p-icon">${item.icon}</div>
      <div class="p-info">
        <div class="p-name">${item.name}</div>
        <div class="p-desc">${hasLink ? item.desc : '即将上线'}</div>
      </div>
      <div class="p-arrow"><svg viewBox="0 0 24 24"><path d="M9.29 6.71a1 1 0 0 1 1.42 0l4.59 4.59a1 1 0 0 1 0 1.42l-4.59 4.59a1 1 0 0 1-1.42-1.42L13.17 12 9.29 8.12a1 1 0 0 1 0-1.41z"/></svg></div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

document.getElementById('tabBar').addEventListener('click', function(e) {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  currentCat = btn.dataset.cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.getElementById('searchInput').value = '';
  render();
});

document.getElementById('searchInput').addEventListener('input', function(e) {
  render(e.target.value.trim());
});

function openViewer(encodedUrl, name) {
  const url = decodeURIComponent(encodedUrl);
  const viewer = document.getElementById('viewer');
  const img = document.getElementById('viewerImg');
  const loading = document.getElementById('viewerLoading');
  const title = document.getElementById('viewerTitle');
  currentList = DATA.filter(d => d.link && d.link.length > 0);
  currentIndex = currentList.findIndex(d => d.link === url);
  title.textContent = name;
  loading.style.display = 'flex';
  loading.innerHTML = '<div class="spinner"></div><span>加载中...</span>';
  img.style.display = 'none';
  img.src = url;
  img.onload = function() { loading.style.display = 'none'; img.style.display = 'block'; };
  img.onerror = function() { loading.innerHTML = '<span>图片加载失败</span>'; };
  viewer.classList.add('show');
  document.body.style.overflow = 'hidden';
  updateNextBtn();
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('show');
  document.getElementById('viewerImg').src = '';
  document.getElementById('viewerLoading').style.display = 'flex';
  document.getElementById('viewerLoading').innerHTML = '<div class="spinner"></div><span>加载中...</span>';
  document.body.style.overflow = '';
}

function viewNext() {
  if (currentList.length === 0) return;
  currentIndex = (currentIndex + 1) % currentList.length;
  const item = currentList[currentIndex];
  const img = document.getElementById('viewerImg');
  const loading = document.getElementById('viewerLoading');
  const title = document.getElementById('viewerTitle');
  title.textContent = item.name;
  loading.style.display = 'flex';
  loading.innerHTML = '<div class="spinner"></div><span>加载中...</span>';
  img.style.display = 'none';
  img.src = item.link;
  img.onload = function() { loading.style.display = 'none'; img.style.display = 'block'; };
  document.getElementById('viewerBody').scrollTop = 0;
  updateNextBtn();
}

function updateNextBtn() {
  document.getElementById('viewerNext').style.display = currentList.length > 1 ? 'flex' : 'none';
}

function updateStats() {
  const products = DATA.filter(d => d.cat === 'product').length;
  const ais = DATA.filter(d => d.cat === 'ai').length;
  document.getElementById('statProduct').textContent = products;
  document.getElementById('statAI').textContent = ais;
  document.getElementById('statTotal').textContent = DATA.length;
}

updateStats();
render();
</script>
</body>
</html>
