<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>客如云产品亮点</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --primary: #1677FF;
    --primary-light: #E8F3FF;
    --primary-dark: #0958D9;
    --accent: #FF6B35;
    --bg: #F5F7FA;
    --card-bg: #FFFFFF;
    --text: #1D2129;
    --text-secondary: #4E5969;
    --text-muted: #86909C;
    --border: #E5E6EB;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #1A1A2E;
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
  }

  .phone-frame {
    width: 100%;
    max-width: 430px;
    background: var(--bg);
    position: relative;
    overflow-x: hidden;
  }
  @media (min-width: 431px) {
    body { padding: 20px 0; }
    .phone-frame {
      border-radius: 36px;
      border: 3px solid #2A2A3E;
      max-height: 932px;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.4);
    }
    .phone-frame::-webkit-scrollbar { width: 0; }
  }

  /* Banner */
  .banner {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
    background: linear-gradient(135deg, #0D47A1 0%, #1976D2 50%, #42A5F5 100%);
  }
  .banner-slides {
    display: flex;
    width: 300%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .banner-slide {
    width: 33.333%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .banner-slide::before {
    content: '';
    position: absolute;
    top: -50%; right: -30%;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .banner-slide::after {
    content: '';
    position: absolute;
    bottom: -30%; left: -20%;
    width: 150px; height: 150px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .banner-slide .slide-icon { font-size: 40px; margin-bottom: 8px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); position: relative; z-index: 1; }
  .banner-slide h2 { color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 6px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); position: relative; z-index: 1; }
  .banner-slide p { color: rgba(255,255,255,0.85); font-size: 12px; max-width: 260px; position: relative; z-index: 1; }
  .banner-dots { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; }
  .banner-dot { width: 8px; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.4); transition: all 0.3s; cursor: pointer; }
  .banner-dot.active { width: 24px; background: #fff; }

  /* Stats */
  .stats-bar {
    display: flex; gap: 10px; padding: 0 16px; margin-top: -24px; position: relative; z-index: 10;
  }
  .stat-card {
    flex: 1; background: var(--card-bg); border-radius: 10px; padding: 10px 6px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .stat-num {
    font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2;
  }
  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }

  /* Tabs */
  .tabs-wrapper {
    position: sticky; top: 0; z-index: 90; background: rgba(245,247,250,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 12px 16px 10px;
  }
  .tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 7px 14px; border-radius: 18px; font-size: 13px; font-weight: 600; color: var(--text-secondary); background: var(--card-bg); border: 1.5px solid var(--border); transition: all 0.3s; cursor: pointer; user-select: none; white-space: nowrap;
  }
  .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 3px 10px rgba(22,119,255,0.35); }
  .tab .count { display: inline-block; background: rgba(0,0,0,0.06); font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: 4px; font-weight: 500; }
  .tab.active .count { background: rgba(255,255,255,0.25); }

  /* Search */
  .search-bar { margin: 0 16px 12px; position: relative; }
  .search-bar input {
    width: 100%; padding: 10px 16px 10px 38px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--card-bg); color: var(--text); outline: none; transition: all 0.3s;
  }
  .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; }

  /* Section */
  .section { padding: 0 16px; margin-bottom: 18px; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 0 2px; }
  .section-icon { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .section-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .section-count { font-size: 11px; color: var(--text-muted); margin-left: auto; font-weight: 500; }

  /* Product Item */
  .product-item {
    background: var(--card-bg);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.04);
    transition: box-shadow 0.3s;
  }
  .product-item:active { box-shadow: 0 2px 12px rgba(22,119,255,0.15); }
  .product-item.open .product-img-wrap { display: block; }
  .product-item.open .arrow { transform: rotate(90deg); }
  .product-item.open { border-color: var(--primary); }

  .product-row {
    display: flex;
    align-items: center;
    padding: 13px 14px;
    gap: 12px;
    cursor: pointer;
  }
  .product-icon {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
  }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .product-cat { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .arrow {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    color: var(--text-muted);
    transition: transform 0.3s;
  }
  .product-img-wrap {
    display: none;
    border-top: 1px solid var(--border);
  }
  .product-img-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }
  .product-placeholder {
    padding: 24px 20px;
    text-align: center;
    background: #F9FAFB;
  }
  .product-placeholder .icon { font-size: 28px; margin-bottom: 6px; }
  .product-placeholder .text { font-size: 12px; color: var(--text-muted); }

  /* Color Themes */
  .theme-store .section-icon { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
  .theme-store .product-icon { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
  .theme-product .section-icon { background: linear-gradient(135deg, #E3F2FD, #BBDEFB); }
  .theme-product .product-icon { background: linear-gradient(135deg, #E3F2FD, #BBDEFB); }
  .theme-ai .section-icon { background: linear-gradient(135deg, #F3E5F5, #E1BEE7); }
  .theme-ai .product-icon { background: linear-gradient(135deg, #F3E5F5, #E1BEE7); }

  /* Tip */
  .save-tip {
    margin: 0 16px 14px; padding: 9px 12px; background: linear-gradient(135deg, #E8F3FF, #D4E8FF); border-radius: 10px; display: flex; align-items: center; gap: 8px; border: 1px solid #B3D4FF;
  }
  .save-tip .icon { font-size: 16px; }
  .save-tip .text { font-size: 12px; color: var(--primary-dark); font-weight: 500; }

  /* Empty */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 44px; margin-bottom: 10px; }

  /* Footer */
  .footer { text-align: center; padding: 16px 16px 40px; color: var(--text-muted); font-size: 11px; }
  .footer .brand { font-weight: 600; color: var(--primary); }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .product-item { animation: fadeInUp 0.35s ease both; }
  .product-item:nth-child(2) { animation-delay: 0.04s; }
  .product-item:nth-child(3) { animation-delay: 0.08s; }
  .product-item:nth-child(4) { animation-delay: 0.12s; }
  .product-item:nth-child(5) { animation-delay: 0.16s; }
</style>
</head>
<body>

<div class="phone-frame">

<!-- Banner -->
<div class="banner" id="banner">
  <div class="banner-slides" id="bannerSlides">
    <div class="banner-slide">
      <div class="slide-icon">☁️</div>
      <h2>客如云产品亮点</h2>
      <p>一站式餐饮数字化解决方案</p>
    </div>
    <div class="banner-slide">
      <div class="slide-icon">📊</div>
      <h2>门店经营</h2>
      <p>聚合外卖 · 扫码点餐 · 会员营销 · 聚合支付 · 连锁管理</p>
    </div>
    <div class="banner-slide">
      <div class="slide-icon">🤖</div>
      <h2>AI 专区</h2>
      <p>客服AI · 效率AI · 效果AI</p>
    </div>
  </div>
  <div class="banner-dots" id="bannerDots">
    <div class="banner-dot active" data-index="0"></div>
    <div class="banner-dot" data-index="1"></div>
    <div class="banner-dot" data-index="2"></div>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-card"><div class="stat-num">3</div><div class="stat-label">产品板块</div></div>
  <div class="stat-card"><div class="stat-num">18</div><div class="stat-label">产品模块</div></div>
  <div class="stat-card"><div class="stat-num">15</div><div class="stat-label">产品图片</div></div>
  <div class="stat-card"><div class="stat-num">3</div><div class="stat-label">AI 能力</div></div>
</div>

<!-- Tabs -->
<div class="tabs-wrapper">
  <div class="tabs" id="tabs">
    <div class="tab active" data-cat="all">全部 <span class="count">18</span></div>
    <div class="tab" data-cat="store">门店经营 <span class="count">5</span></div>
    <div class="tab" data-cat="product">产品知识 <span class="count">10</span></div>
    <div class="tab" data-cat="ai">AI专区 <span class="count">3</span></div>
  </div>
</div>

<!-- Search -->
<div class="search-bar">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="搜索产品名称...">
</div>

<!-- Tip -->
<div class="save-tip">
  <span class="icon">💡</span>
  <span class="text">点击产品名称查看截图，长按可保存转发</span>
</div>

<!-- Content -->
<div id="content"></div>

<!-- Footer -->
<div class="footer">
  <span class="brand">客如云</span> · 让餐饮经营更简单<br>
  <span style="opacity:0.7">销售内部资料 · 请勿外传</span>
</div>

</div>

<script>
const products = [
  { cat: "store", catName: "门店经营", icon: "📦", name: "聚合外卖", img: "https://img.alicdn.com/imgextra/i4/O1CN01WfKXSi1nFzdRGcxuP_!!6000000005061-0-tps-930-5342.jpg" },
  { cat: "store", catName: "门店经营", icon: "📱", name: "扫码点餐", img: "https://img.alicdn.com/imgextra/i1/O1CN01umNvzd22xhffC2rA4_!!6000000007187-0-tps-1125-11530.jpg" },
  { cat: "store", catName: "门店经营", icon: "👥", name: "会员营销", img: "https://img.alicdn.com/imgextra/i3/O1CN01ERnKi220jO3kms6Em_!!6000000006885-0-tps-1242-7406.jpg" },
  { cat: "store", catName: "门店经营", icon: "💳", name: "聚合支付", img: "https://img.alicdn.com/imgextra/i3/O1CN010DbquX1lebgm9gcSq_!!6000000004844-0-tps-1242-9845.jpg" },
  { cat: "store", catName: "门店经营", icon: "🏢", name: "连锁管理", img: "https://img.alicdn.com/imgextra/i1/O1CN01xsnVqc213XUCGh4bb_!!6000000006929-0-tps-1242-9493.jpg" },
  { cat: "product", catName: "产品知识", icon: "🍳", name: "智能后厨KDS", img: "https://img.alicdn.com/imgextra/i1/O1CN01xsnVqc213XUCGh4bb_!!6000000006929-0-tps-1242-9493.jpg" },
  { cat: "product", catName: "产品知识", icon: "💬", name: "企微代运营", img: "https://img.alicdn.com/imgextra/i3/O1CN01Tv1DaE24qUfSyuIHK_!!6000000007442-0-tps-1836-13492.jpg" },
  { cat: "product", catName: "产品知识", icon: "🏷️", name: "碰碰贴", img: "https://img.alicdn.com/imgextra/i3/O1CN010DbquX1lebgm9gcSq_!!6000000004844-0-tps-1242-9845.jpg" },
  { cat: "product", catName: "产品知识", icon: "📊", name: "经营大屏", img: "https://img.alicdn.com/imgextra/i3/O1CN01ERnKi220jO3kms6Em_!!6000000006885-0-tps-1242-7406.jpg" },
  { cat: "product", catName: "产品知识", icon: "📋", name: "易定", img: "https://img.alicdn.com/imgextra/i3/O1CN01cKas1H1ks3hpV0FjQ_!!6000000004738-0-tps-1242-10091.jpg" },
  { cat: "product", catName: "产品知识", icon: "🔍", name: "智能巡店", img: "https://img.alicdn.com/imgextra/i1/O1CN01ePst2920lDdxCMKQl_!!6000000006889-0-tps-2400-18774.jpg" },
  { cat: "product", catName: "产品知识", icon: "🛒", name: "新零售", img: "https://img.alicdn.com/imgextra/i4/O1CN01OrFhlx26pEoUpAwJm_!!6000000007710-0-tps-1080-13361.jpg" },
  { cat: "product", catName: "产品知识", icon: "📦", name: "进销存", img: "https://img.alicdn.com/imgextra/i4/O1CN01XR5AuN1jrlqCRapkj_!!6000000004602-0-tps-1242-7952.jpg" },
  { cat: "product", catName: "产品知识", icon: "🚚", name: "文典供应链", img: "https://img.alicdn.com/imgextra/i2/O1CN01nsaKXy1wjbmt75RsP_!!6000000006344-0-tps-750-11224.jpg" },
  { cat: "product", catName: "产品知识", icon: "🧾", name: "电子发票", img: "https://img.alicdn.com/imgextra/i4/O1CN01WfKXSi1nFzdRGcxuP_!!6000000005061-0-tps-930-5342.jpg" },
  { cat: "product", catName: "产品知识", icon: "🏪", name: "智慧分销商城", img: "https://img.alicdn.com/imgextra/i1/O1CN01umNvzd22xhffC2rA4_!!6000000007187-0-tps-1125-11530.jpg" },
  { cat: "ai", catName: "AI专区", icon: "🎧", name: "客服AI", img: null },
  { cat: "ai", catName: "AI专区", icon: "⚡", name: "效率AI", img: null },
  { cat: "ai", catName: "AI专区", icon: "🎯", name: "效果AI", img: null }
];

const catConfig = {
  store: { title: "门店经营", theme: "theme-store", icon: "📊", desc: "5个核心模块" },
  product: { title: "产品知识", theme: "theme-product", icon: "🔧", desc: "10个产品功能" },
  ai: { title: "AI专区", theme: "theme-ai", icon: "🤖", desc: "3个AI能力" }
};

let currentCat = "all";

function render(filter = "") {
  const content = document.getElementById("content");
  let filtered = products;
  if (currentCat !== "all") filtered = filtered.filter(p => p.cat === currentCat);
  if (filter) filtered = filtered.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
  
  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div class="text">未找到相关产品</div></div>`;
    return;
  }
  
  const groups = {};
  filtered.forEach(p => { if (!groups[p.cat]) groups[p.cat] = []; groups[p.cat].push(p); });
  
  let html = "";
  ["store", "product", "ai"].forEach(cat => {
    if (!groups[cat]) return;
    const cfg = catConfig[cat];
    html += `<div class="section ${cfg.theme}">`;
    html += `<div class="section-header">
      <div class="section-icon">${cfg.icon}</div>
      <div class="section-title">${cfg.title}</div>
      <div class="section-count">${cfg.desc}</div>
    </div>`;
    
    groups[cat].forEach(p => {
      const imgHtml = p.img
        ? `<div class="product-img-wrap"><img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'product-placeholder\\'><div class=\\'icon\\'>🖼️</div><div class=\\'text\\'>图片加载中</div></div>'"></div>`
        : `<div class="product-img-wrap"><div class="product-placeholder"><div class="icon">🚧</div><div class="text">内容补充中</div></div></div>`;
      
      html += `<div class="product-item" onclick="this.classList.toggle('open')">
        <div class="product-row">
          <div class="product-icon">${p.icon}</div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-cat">${p.catName}</div>
          </div>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
        ${imgHtml}
      </div>`;
    });
    html += `</div>`;
  });
  content.innerHTML = html;
}

document.getElementById("tabs").addEventListener("click", function(e) {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  currentCat = tab.dataset.cat;
  render(document.getElementById("searchInput").value);
});

document.getElementById("searchInput").addEventListener("input", function(e) { render(e.target.value); });

// Banner
let currentSlide = 0;
const totalSlides = 3;
let autoTimer;
function goToSlide(i) {
  currentSlide = i;
  document.getElementById("bannerSlides").style.transform = `translateX(-${i*33.333}%)`;
  document.querySelectorAll(".banner-dot").forEach((d,j) => d.classList.toggle("active", j===i));
}
function nextSlide() { goToSlide((currentSlide+1)%totalSlides); }
function startAuto() { autoTimer = setInterval(nextSlide, 4000); }
function stopAuto() { clearInterval(autoTimer); }
document.getElementById("bannerDots").addEventListener("click", function(e) {
  const dot = e.target.closest(".banner-dot");
  if (!dot) return; stopAuto(); goToSlide(+dot.dataset.index); startAuto();
});
let touchX = 0;
const banner = document.getElementById("banner");
banner.addEventListener("touchstart", e => { touchX = e.touches[0].clientX; stopAuto(); }, {passive:true});
banner.addEventListener("touchend", e => {
  const d = touchX - e.changedTouches[0].clientX;
  if (Math.abs(d) > 50) goToSlide(d > 0 ? (currentSlide+1)%totalSlides : (currentSlide-1+totalSlides)%totalSlides);
  startAuto();
}, {passive:true});
startAuto();

render();
</script>
</body>
</html>
